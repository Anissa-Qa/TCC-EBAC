name: CI Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        project: [UI, API]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: ${{ matrix.project }}
        run: |
          echo "Instalando dependências em ${{ matrix.project }}"
          npm install

      - name: Run tests
        working-directory: ${{ matrix.project }}
        run: |
          echo "Rodando testes em ${{ matrix.project }}"
          npm test

      - name: Test result message (success)
        if: success()
        run: echo "✅ Testes em ${{ matrix.project }} passaram com sucesso!"

      - name: Test result message (failure)
        if: failure()
        run: echo "❌ Testes em ${{ matrix.project }} falharam, verifique o log."
